name: Fetch crypto news

on:
  schedule:
    # Runs every 4 hours at minute 7 (offset from the hour to be polite to feeds)
    - cron: '7 */4 * * *'
  workflow_dispatch:  # Allow manual triggering from the Actions tab
  push:
    branches: [main]
    paths:
      - 'feeds.json'
      - 'scripts/fetch_feeds.py'
      - '.github/workflows/fetch-news.yml'

permissions:
  contents: write

concurrency:
  group: fetch-news
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch feeds
        run: python scripts/fetch_feeds.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/archive/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh news feed [$(date -u +'%Y-%m-%dT%H:%MZ')]"
            git push
          fi
